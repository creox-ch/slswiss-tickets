# ОДНОРАЗОВЫЙ workflow: сгенерировать package-lock.json (локально нет node/npm).
# Запуск вручную (workflow_dispatch) → артефакт скачиваем и коммитим → workflow удаляем.
name: Generate lockfile

on:
  workflow_dispatch:

jobs:
  lockfile:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --package-lock-only
      - uses: actions/upload-artifact@v4
        with:
          name: package-lock
          path: package-lock.json
